<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Interactive background gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="100" height="100" rx="20" fill="url(#bg-grad)" />
  
  <!-- Outer glowing border -->
  <rect width="90" height="90" x="5" y="5" rx="16" fill="none" stroke="rgba(56, 189, 248, 0.4)" stroke-width="2" filter="url(#glow)"/>

  <!-- TMR Monogram -->
  <text x="50" y="65" font-family="'Outfit', 'Inter', sans-serif" font-weight="bold" font-size="40" fill="url(#text-grad)" text-anchor="middle" filter="url(#glow)">TMR</text>
  
  <!-- Cyan dot -->
  <circle cx="82" cy="62" r="5" fill="#38bdf8" filter="url(#glow)"/>
</svg>
